# Copia in:  .github/workflows/update-transfers.yml
# Ogni 10 giorni avvia l'API Transfermarkt DENTRO l'Action (nessun server tuo,
# nessuna chiave), genera data/market_updates.json e fa commit.
name: Aggiorna rose reali (Transfermarkt)

on:
  schedule:
    - cron: '0 4 */10 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clona transfermarkt-api
        run: git clone --depth 1 https://github.com/felipeall/transfermarkt-api.git tmapi

      - name: Installa dipendenze API
        run: |
          cd tmapi
          pip install -r requirements.txt || (pip install poetry && poetry export -f requirements.txt --without-hashes -o req.txt && pip install -r req.txt) || pip install fastapi uvicorn beautifulsoup4 lxml httpx requests xmltodict

      - name: Avvia transfermarkt-api
        run: |
          cd tmapi
          (nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../tmapi.log 2>&1 &) || (nohup uvicorn main:app --host 127.0.0.1 --port 8000 > ../tmapi.log 2>&1 &)
          sleep 20
          echo '---- tmapi.log ----'; cat ../tmapi.log || true
          echo '---- ping ----'; curl -s http://127.0.0.1:8000/ | head -c 300 || true

      - name: Genera feed rose reali
        env:
          TM_API: 'http://127.0.0.1:8000'
          COMPS: 'IT1,GB1,ES1,L1,FR1'
        run: python scrape_transfers.py

      - name: Commit del feed aggiornato
        run: |
          git config user.name "transfer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/market_updates.json
          git commit -m "Aggiornamento rose reali (Transfermarkt)" || echo "nessuna modifica"
          git push
