# Copia questo file in:  .github/workflows/update-transfers.yml  del repo del tuo sito.
# Fa girare lo scraper OGNI 10 GIORNI in automatico e aggiorna data/market_updates.json.
# Devi solo aggiungere una volta il secret APISPORTS_KEY (vedi README.txt).
name: Aggiorna trasferimenti reali

on:
  schedule:
    - cron: '0 4 */10 * *'   # ogni 10 giorni alle 04:00 UTC
  workflow_dispatch:          # + pulsante manuale "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scarica trasferimenti reali
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          LEAGUES: '135,39,140,78,61'
          DAYS_BACK: '20'
        run: python scrape_transfers.py
      - name: Commit del feed aggiornato
        run: |
          git config user.name "transfer-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/market_updates.json
          git commit -m "Aggiornamento trasferimenti reali" || echo "nessuna modifica"
          git push
